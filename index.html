    <title>Industria Gráfica Alquimista | Sacolas Personalizadas</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
      /* Seu CSS existente continua igual */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100dvh;
        background: #131313;
        font-family: 'Inter', system-ui, sans-serif;
        position: relative;
        overflow: hidden;
      }
      .loading-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      .loading-bg::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBBBjEHtflVmbKzXyX1gbSSylJF7fMJUknmN2Erpf8FFLD7Retd81X2LI8Kcq102eAjmLAHCmQa4iYc3jF-B-KaWIyk77nAP3juXX625cY3ZlvkCTeYuARGyVovzBYHaa8Uy29_xvSAQudDyk5wA27scqz1HyfrE0z1w78Nib7VS4hoHk6FHB5XuiiM3DB1nuYdfhIH2y5cUqzQjseoYQlZ6mAytAMBLKRga6yN4aDwDcg02j6O9-F5eHjo9e-qSetyHZbTcTO-02R_');
        background-size: cover;
        background-position: center;
        filter: blur(8px) brightness(0.4);
        transform: scale(1.05);
      }
      .loading-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(19, 19, 19, 0.85) 0%, rgba(19, 19, 19, 0.7) 50%, rgba(0, 221, 221, 0.1) 100%);
      }
      .loading-container {
        position: relative;
        z-index: 10;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
        backdrop-filter: blur(4px);
      }
      .brand {
        text-align: center;
        margin-bottom: 1rem;
      }
      .brand-icon {
        font-size: 4rem;
        color: #00fbfb;
        filter: drop-shadow(0 0 20px #00dddd);
        margin-bottom: 1rem;
      }
      .brand h1 {
        font-size: 1.75rem;
        font-weight: 900;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        background: linear-gradient(135deg, #ffffff 0%, #00dddd 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
      }
      .brand p {
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #b9cac9;
        font-weight: 500;
      }
      .spinner-wrapper {
        position: relative;
        width: 80px;
        height: 80px;
      }
      .spinner-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 3px solid transparent;
        border-top-color: #00fbfb;
        border-right-color: #00dddd;
        border-radius: 50%;
        animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }
      .spinner-ring:nth-child(2) {
        width: 60px;
        height: 60px;
        top: 10px;
        left: 10px;
        border-top-color: #fe00fe;
        border-left-color: #ffabf3;
        animation: spin 1.5s reverse infinite;
      }
      .spinner-ring:nth-child(3) {
        width: 40px;
        height: 40px;
        top: 20px;
        left: 20px;
        border-bottom-color: #eaea00;
        border-right-color: #ffff00;
        animation: spin 0.8s infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spinner-core {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #00fbfb;
        border-radius: 50%;
        top: 30px;
        left: 30px;
        animation: pulse 1.5s ease-in-out infinite;
        box-shadow: 0 0 20px #00fbfb;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.8);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
          box-shadow:
            0 0 30px #00fbfb,
            0 0 10px #fe00fe;
        }
      }
      .loading-text {
        text-align: center;
        margin-top: 1rem;
      }
      .loading-text .main {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #e5e2e1;
        margin-bottom: 0.75rem;
      }
      .loading-text .sub {
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        color: #b9cac9;
        font-weight: 400;
      }
      .loading-text .dots {
        display: inline-flex;
        gap: 4px;
        margin-left: 4px;
      }
      .loading-text .dots span {
        animation: blink 1.4s infinite;
        font-weight: 900;
      }
      .loading-text .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-text .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }
      .progress-bar {
        width: 280px;
        max-width: 80%;
        height: 2px;
        background: rgba(0, 221, 221, 0.2);
        border-radius: 4px;
        overflow: hidden;
        margin-top: 1.5rem;
      }
      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #00fbfb, #fe00fe, #eaea00);
        border-radius: 4px;
        animation: progress 2s ease-out forwards;
      }
      @keyframes progress {
        0% {
          width: 0%;
        }
        30% {
          width: 45%;
        }
        60% {
          width: 75%;
        }
        100% {
          width: 100%;
        }
      }
      .badge {
        position: fixed;
        bottom: 2rem;
        left: 0;
        right: 0;
        text-align: center;
        z-index: 10;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        color: #839493;
        text-transform: uppercase;
      }
      @media (max-width: 768px) {
        .brand h1 {
          font-size: 1.25rem;
          letter-spacing: 0.1em;
        }
        .brand-icon {
          font-size: 3rem;
        }
        .spinner-wrapper {
          width: 60px;
          height: 60px;
        }
        .spinner-ring:nth-child(2) {
          width: 45px;
          height: 45px;
          top: 7.5px;
          left: 7.5px;
        }
        .spinner-ring:nth-child(3) {
          width: 30px;
          height: 30px;
          top: 15px;
          left: 15px;
        }
        .spinner-core {
          width: 14px;
          height: 14px;
          top: 23px;
          left: 23px;
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-bg"></div>
    <div class="loading-container">
      <div class="brand">
        <div class="brand-icon">
          <span class="material-symbols-outlined" style="font-size: inherit; font-variation-settings: 'FILL' 1">manufacturing</span>
        </div>
        <h1>Industria Gráfica Alquimista</h1>
        <p>Premium Custom Bags</p>
      </div>
      <div class="spinner-wrapper">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-core"></div>
      </div>
      <div class="loading-text">
        <div class="main">
          OTIMIZANDO EXPERIÊNCIA<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </div>
        <div class="sub">DETECTANDO DISPOSITIVO • CARREGANDO CONFIGURADOR</div>
      </div>
      <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>
    <div class="badge" id="brand-badge">INDUSTRIAL PRINTING TECHNOLOGY • SINCE 2025</div>
    <script>
      ;(function () {
        const isMobileDevice = () =>
          window.innerWidth <= 768 ||
          /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Windows Phone|Mobile/i.test(navigator.userAgent)
        const targetPage = isMobileDevice() ? 'pages/mobile.html' : 'pages/desktop.html'
        const minDelay = 1200
        const startTime = Date.now()

        const redirect = () => {
          const elapsed = Date.now() - startTime
          const remaining = minDelay - elapsed
          if (remaining > 0) setTimeout(() => window.location.replace(targetPage), remaining)
          else window.location.replace(targetPage)
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', redirect)
        else redirect()

        setTimeout(() => window.location.replace(targetPage), 3000)
        console.log(`[Industria Gráfica Alquimista] ${isMobileDevice() ? 'MOBILE' : 'DESKTOP'} → ${targetPage}`)
      })()
    </script>
    <script>
      // Atualiza o ano automaticamente no badge
      ;(function updateBadgeYear() {
        const currentYear = new Date().getFullYear()
        const badgeElement = document.getElementById('brand-badge')
        if (badgeElement) {
          badgeElement.innerHTML = `INDUSTRIA GRÁFICA ALQUIMISTAS • SINCE ${currentYear}`
        }
      })()
    </script>
  </body>
</html>
